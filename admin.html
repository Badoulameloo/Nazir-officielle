<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAZIR | Dashboard Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: white; padding: 40px; font-family: 'Inter', sans-serif; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: #111; padding: 30px; border: 1px solid #222; border-radius: 12px; text-align: center; }
        .stat-card h2 { font-size: 0.8rem; color: #888; letter-spacing: 2px; text-transform: uppercase; }
        .stat-card p { font-size: 2.5rem; font-weight: 900; margin: 10px 0; color: #2ecc71; }
        .recent-orders { margin-top: 50px; background: #111; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body>
    <div id="login-screen" style="text-align: center; margin-top: 100px;">
        <h1>ACCÈS RÉSERVÉ</h1>
        <input type="password" id="admin-pass" placeholder="Mot de passe" style="padding: 15px; background: #111; border: 1px solid #333; color: white; margin-top: 20px;">
        <button onclick="checkPass()" style="padding: 15px 30px; background: white; border: none; font-weight: bold; cursor: pointer; margin-left: 10px;">ENTRER</button>
    </div>

    <div id="admin-content" style="display: none;">
        <h1>TABLEAU DE BORD <span style="color: #888; font-size: 1rem;">| NAZIR</span></h1>
        
        <div class="admin-grid">
            <div class="stat-card">
                <h2>Total Visites</h2>
                <p id="stat-visits">0</p>
            </div>
            <div class="stat-card">
                <h2>Commandes Tentées</h2>
                <p id="stat-orders">0</p>
            </div>
            <div class="stat-card">
                <h2>Revenu Potentiel</h2>
                <p id="stat-revenue">0 F</p>
            </div>
        </div>

        <div class="recent-orders">
            <h3>LOGS D'ACTIVITÉ RÉCENTE</h3>
            <table id="logs-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Action</th>
                        <th>Détails</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    </tbody>
            </table>
            <button onclick="clearLogs()" style="margin-top: 20px; background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; cursor: pointer;">Effacer l'historique</button>
        </div>
    </div>

    <script>
        const PASS_SECRET = "NAZIR2026"; // CHANGE TON MOT DE PASSE ICI

        function checkPass() {
            if (document.getElementById('admin-pass').value === PASS_SECRET) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadStats();
            } else {
                alert("Accès refusé");
            }
        }

        function loadStats() {
            document.getElementById('stat-visits').innerText = localStorage.getItem('total_visites') || 0;
            document.getElementById('stat-orders').innerText = localStorage.getItem('total_commandes') || 0;
            document.getElementById('stat-revenue').innerText = (localStorage.getItem('total_revenu') || 0) + " F";
            
            const logs = JSON.parse(localStorage.getItem('admin_logs')) || [];
            const body = document.getElementById('logs-body');
            body.innerHTML = logs.reverse().map(log => `
                <tr>
                    <td>${log.date}</td>
                    <td>${log.action}</td>
                    <td>${log.details}</td>
                </tr>
            `).join('');
        }

        function clearLogs() {
            if(confirm("Effacer toutes les données ?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
