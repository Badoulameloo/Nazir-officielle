<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | NAZIR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
</head>
<body class="dark-theme">

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html">HOME</a>
            <a href="heritage.html">HÉRITAGE</a>
            <a href="contact.html" class="active">CONTACT</a>
        </div>
        <div class="nav-logo">
            <img src="img/img.logo.jpeg.png.png" alt="NAZIR" style="width: 80px;">
        </div>
        <div class="nav-right">
            <a href="panier.html" id="cart-count-nav">PANIER (0)</a>
        </div>

    <main class="contact-simple-wrapper">
        <header class="contact-header" data-aos="fade-down">

            <h1>NOUS JOINDRE</h1>
            <div class="elegant-line"></div>
        </header>

        <section class="contact-links-container" data-aos="fade-up">
            
            <div class="contact-card-simple">
                <h3>INSTAGRAM</h3>
                <p>Pour toute question ou commande directe</p>
                <a href="https://www.instagram.com/nazir_nazircollection?igsh=MWQxZ2Qyc2wxdzZydQ==" target="_blank" class="link-btn">@nazir_nazircollection</a>
            </div>

            <div class="contact-card-simple">
                <h3>TIKTOK</h3>
                <p>Suivez l'univers de la marque</p>
                <a href="https://www.tiktok.com/@nazircollection6?_r=1&_t=ZS-94w5XCvzaZW" target="_blank" class="link-btn">NAZIR COLLECTION</a>
            </div>

            <div class="contact-card-simple">
                <h3>VOS AVIS</h3>
                <p>Envoyez-nous vos retours par mail</p>
                <a href="bvdound@gmail.com" class="link-btn">ENVOYER UN MAIL</a>
            </div>

        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 NAZIR OFFICIEL. MADE IN DAKAR.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        window.onload = function() {
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            document.getElementById('cart-count-nav').innerText = `PANIER (${panier.length})`;
        };
    </script>
</body>
</html>
