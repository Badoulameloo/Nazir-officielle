<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAZIR | Bientôt de retour</title>
    <style>
        body { background: #000; color: white; display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; text-align: center; margin: 0; }
        .content { border: 1px solid #333; padding: 50px; }
        h1 { letter-spacing: 10px; font-size: 3rem; }
        p { color: #888; letter-spacing: 2px; }
        .loader { border: 2px solid #333; border-top: 2px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="content">
        <h1>NAZIR</h1>
        <p>MAINTENANCE EN COURS...</p>
        <div class="loader"></div>
        <p style="font-size: 0.8rem;">On prépare la nouvelle collection.</p>
    </div>
</body>
</html>
