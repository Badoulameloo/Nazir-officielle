<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAZIR | Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIDER MA COMMANDE | NAZIR</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: auto; padding: 40px 20px; }
        .summary-box { background: #1a1a1a; padding: 20px; border: 1px solid #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #888; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        
        /* Boutons de paiement */
        .payment-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .pay-btn { 
            padding: 15px 5px; border: 1px solid #333; background: #111; color: white; 
            cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .pay-btn:hover { border-color: white; background: #222; }
        .pay-btn.active { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        
        .whatsapp-submit { 
            width: 100%; background: #25D366; color: white; padding: 20px; 
            border: none; font-weight: bold; margin-top: 30px; cursor: pointer; 
            font-size: 1rem; border-radius: 5px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="checkout-container">
        <h1 style="letter-spacing: 5px;">FINALISER</h1>

         <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N8J66RCS"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
        
        <div class="summary-box">
            <h3 style="margin-top:0;">MA COMMANDE</h3>
            <div id="order-summary"></div>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <p id="order-total" style="font-size: 1.2rem; font-weight: bold; margin:0;"></p>
        </div>

        <div class="form-group">
            <label>NOM COMPLET</label>
            <input type="text" id="client-name" placeholder="Votre nom..." required>
        </div>
        <div class="form-group">
            <label>QUARTIER / VILLE</label>
            <input type="text" id="client-address" placeholder="Ex: Almadies, Dakar..." required>
        </div>

        <label style="margin-top:20px; font-weight: bold; letter-spacing: 1px;">MODE DE PAIEMENT</label>
        <div class="payment-options">
            <button class="pay-btn" onclick="selectPayment('WAVE', this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Wave_Logo_2021.svg/1200px-Wave_Logo_2021.svg.png" alt="Wave" style="width: 30px; height: 30px; object-fit: contain;">
                WAVE
            </button>

            <button class="pay-btn" onclick="selectPayment('ORANGE MONEY', this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Orange_Money_logo.svg/1200px-Orange_Money_logo.svg.png" alt="OM" style="width: 30px; height: 30px; object-fit: contain;">
                O. MONEY
            </button>

            <button class="pay-btn" onclick="selectPayment('CASH À LA LIVRAISON', this)">
                <div style="font-size: 24px;">📦</div>
                CASH
            </button>
        </div>

        <button class="whatsapp-submit" onclick="envoyerWhatsApp()">COMMANDER VIA WHATSAPP</button>
    </div>

    <script>
        let modeChoisi = "";

        window.onload = function() {
            let achatRapide = JSON.parse(localStorage.getItem('achat_rapide'));
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            let articles = achatRapide ? [achatRapide] : panier;
            
            const summaryDiv = document.getElementById('order-summary');
            const totalP = document.getElementById('order-total');
            let total = 0;

            if (articles.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            articles.forEach(item => {
                summaryDiv.innerHTML += `<p style="margin:5px 0;">• ${item.nom} (${item.taille}) - ${item.prix} CFA</p>`;
                total += parseInt(item.prix.replace('.', '').replace(' ', ''));
            });

            totalP.innerText = "TOTAL : " + total.toLocaleString() + " CFA";
        };

        function selectPayment(mode, element) {
            modeChoisi = mode;
            document.querySelectorAll('.pay-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function envoyerWhatsApp() {
            const nom = document.getElementById('client-name').value;
            const adresse = document.getElementById('client-address').value;
            
            if (!nom || !adresse || !modeChoisi) {
                alert("Veuillez remplir votre nom, adresse et choisir un mode de paiement.");
                return;
            }

            let achatRapide = JSON.parse(localStorage.getItem('achat_rapide'));
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            let articles = achatRapide ? [achatRapide] : panier;
            
            let message = `Bonjour NAZIR, je souhaite passer une commande :\n\n`;
            message += `👤 *Client :* ${nom}\n`;
            message += `📍 *Adresse :* ${adresse}\n`;
            message += `💳 *Paiement :* ${modeChoisi}\n\n`;
            message += `🛒 *Articles :*\n`;

            let total = 0;
            articles.forEach(item => {
                message += `- ${item.nom} (Taille: ${item.taille}) - ${item.prix} CFA\n`;
                total += parseInt(item.prix.replace('.', '').replace(' ', ''));
            });

            message += `\n💰 *TOTAL : ${total.toLocaleString()} CFA*`;

            // REMPLACE LE NUMÉRO CI-DESSOUS PAR TON VRAI NUMÉRO (Format international sans le +)
            const monNumero = "221776547004"; 
            const url = `https://wa.me/${monNumero}?text=${encodeURIComponent(message)}`;
            
            localStorage.removeItem('monPanier');
            localStorage.removeItem('achat_rapide');
            window.open(url, '_blank');
        }

        // Enregistre la commande dans les stats
let nbCommandes = parseInt(localStorage.getItem('total_commandes') || 0);
localStorage.setItem('total_commandes', nbCommandes + 1);

let revenu = parseInt(localStorage.getItem('total_revenu') || 0);
localStorage.setItem('total_revenu', revenu + total);

// Ajoute un log
let logs = JSON.parse(localStorage.getItem('admin_logs')) || [];
logs.push({
    date: new Date().toLocaleString(),
    action: "COMMANDE",
    details: `${nom} - ${total} CFA (${modeChoisi})`
});
localStorage.setItem('admin_logs', JSON.stringify(logs));
    </script>
</body>
</html>
