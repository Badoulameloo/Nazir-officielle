<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIEMENT | NAZIR</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: auto; padding: 40px 20px; }
        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; margin-top: 5px; }
        .summary-box { background: #1a1a1a; padding: 20px; border: 1px solid #333; margin-bottom: 30px; }
        .pay-now-btn { width: 100%; background: #2ecc71; color: white; padding: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body class="dark-theme">
    <div class="checkout-container">
        <h1>COMMANDE</h1>
        
        <div class="summary-box">
            <h3>RÉSUMÉ</h3>
            <div id="order-summary"></div>
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <p id="order-total" style="font-weight: bold; font-size: 1.2rem;"></p>
        </div>

        <form id="payment-form">
            <div class="form-group">
                <label>Nom Complet</label>
                <input type="text" placeholder="Alioune..." required>
            </div>
            <div class="form-group">
                <label>Numéro de Téléphone</label>
                <input type="tel" placeholder="77..." required>
            </div>
            <div class="form-group">
                <label>Quartier de livraison (Dakar)</label>
                <input type="text" placeholder="Ex: Plateau, Almadies..." required>
            </div>
            <div class="form-group">
                <label>Mode de Paiement</label>
                <select id="method">
                    <option value="wave">Wave</option>
                    <option value="om">Orange Money</option>
                    <option value="cash">Paiement à la livraison</option>
                </select>
            </div>
            <button type="submit" class="pay-now-btn">CONFIRMER LA COMMANDE</button>
        </form>
    </div>

    <script>
        window.onload = function() {
            // On vérifie s'il y a un achat rapide ou le panier complet
            let achatRapide = JSON.parse(localStorage.getItem('achat_rapide'));
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            let articles = achatRapide ? [achatRapide] : panier;
            
            const summaryDiv = document.getElementById('order-summary');
            const totalP = document.getElementById('order-total');
            let total = 0;

            articles.forEach(item => {
                summaryDiv.innerHTML += `<p>${item.nom} (${item.taille}) - ${item.prix} CFA</p>`;
                total += parseInt(item.prix.replace('.', '').replace(' ', ''));
            });

            totalP.innerText = "TOTAL : " + total.toLocaleString() + " CFA";
        };

        document.getElementById('payment-form').onsubmit = function(e) {
            e.preventDefault();
            alert("Merci pour votre commande ! Nous allons vous contacter par téléphone pour confirmer la livraison.");
            localStorage.removeItem('monPanier');
            localStorage.removeItem('achat_rapide');
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
